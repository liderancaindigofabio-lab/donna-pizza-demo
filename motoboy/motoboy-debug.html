<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Debug Motoboy</title>
<style>
  #dbg { position:fixed; top:0; left:0; right:0; max-height:50vh; overflow:auto; background:#000; color:#0f0; font:11px monospace; padding:10px; z-index:9999; }
  #dbg .err { color:#f55; }
  #dbg .warn { color:#fa0; }
  #dbg .ok { color:#5f5; }
</style>
</head>
<body>
<div id="dbg"></div>
<script>
const dbg = document.getElementById('dbg');
function log(msg, type='') {
  const div = document.createElement('div');
  div.className = type;
  div.textContent = '[' + new Date().toISOString().substr(11,8) + '] ' + msg;
  dbg.appendChild(div);
}
const origLog = console.log;
const origErr = console.error;
const origWarn = console.warn;
console.log = function(...args) { log(args.join(' '), 'ok'); origLog.apply(console, args); };
console.warn = function(...args) { log('⚠️ ' + args.join(' '), 'warn'); origWarn.apply(console, args); };
console.error = function(...args) { log('❌ ' + args.join(' '), 'err'); origErr.apply(console, args); };
window.addEventListener('error', e => log('❌ ERROR: ' + e.message + ' @ ' + e.filename + ':' + e.lineno + ':' + e.colno, 'err'));
window.addEventListener('unhandledrejection', e => log('❌ UNHANDLED: ' + (e.reason && e.reason.message || e.reason), 'err'));
</script>
<script src="https://liderancaindigofabio-lab.github.io/donna-pizza-demo/js/firebase/config.js"></script>
<script src="https://liderancaindigofabio-lab.github.io/donna-pizza-demo/js/firebase/loader.js"></script>
<script>
setTimeout(() => {
  log('=== Verificando ===');
  if (typeof DB === 'undefined') { log('DB indefinido!', 'err'); return; }
  log('DB._ready = ' + DB._ready);
  log('DB._cachePedidos.length = ' + (DB._cachePedidos || []).length);
  // Ver os motoboys
  const motoboys = DB.getMotoboys();
  log('Motoboys: ' + motoboys.length);
  motoboys.forEach(m => log('  ' + m.id + ': ' + m.nome + ' (status=' + m.status + ')'));
  // Ver os pedidos do motoboy 1
  const emRota = DB.getPedidosMotoboy(1);
  log('Pedidos em rota do motoboy 1: ' + emRota.length);
  emRota.forEach(p => {
    log('  - id=' + p.id + ' (type=' + typeof p.id + '), status=' + p.status + ', motoboyId=' + p.motoboyId + ' (type=' + typeof p.motoboyId + ')');
    log('    clienteNome=' + p.clienteNome);
  });
  // Setar localStorage e reload
  if (emRota.length > 0) {
    log('Tudo OK, motoboy pode ser testado', 'ok');
  } else {
    log('PROBLEMA: motoboy 1 não tem pedidos em rota', 'err');
    // Listar todos os pedidos
    const all = DB.getPedidos();
    log('Todos os pedidos: ' + all.length);
    all.filter(p => p.motoboyId).slice(0, 5).forEach(p => {
      log('  - ' + p.id + ': status=' + p.status + ', motoboyId=' + p.motoboyId + ' (type=' + typeof p.motoboyId + ')');
    });
  }
}, 5000);
</script>
</body>
</html>

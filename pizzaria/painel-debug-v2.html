<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Debug Console</title>
<style>
  #dbg { position:fixed; top:0; left:0; right:0; max-height:90vh; overflow:auto; background:#000; color:#0f0; font:11px monospace; padding:10px; z-index:9999; }
  #dbg .err { color:#f55; }
  #dbg .warn { color:#fa0; }
  #dbg .ok { color:#5f5; }
  #dbg .loader-log { color:#5ff; }
</style>
</head>
<body>
<div id="dbg"></div>
<script>
const dbg = document.getElementById('dbg');
function log(msg, type='') {
  const div = document.createElement('div');
  div.className = type;
  div.textContent = '[' + new Date().toISOString().substr(11,8) + '] ' + msg;
  dbg.appendChild(div);
}
// Capturar console.log do navegador
const origLog = console.log;
const origWarn = console.warn;
const origErr = console.error;
console.log = function(...args) { log(args.join(' '), 'loader-log'); origLog.apply(console, args); };
console.warn = function(...args) { log('⚠️ ' + args.join(' '), 'warn'); origWarn.apply(console, args); };
console.error = function(...args) { log('❌ ' + args.join(' '), 'err'); origErr.apply(console, args); };
window.addEventListener('error', e => log('❌ ERROR: ' + e.message + ' @ ' + e.filename + ':' + e.lineno + ':' + e.colno, 'err'));
window.addEventListener('unhandledrejection', e => log('❌ UNHANDLED: ' + (e.reason && e.reason.message || e.reason), 'err'));
log('Página carregada', 'ok');
</script>
<script src="https://liderancaindigofabio-lab.github.io/donna-pizza-demo/js/firebase/config.js"></script>
<script src="https://liderancaindigofabio-lab.github.io/donna-pizza-demo/js/firebase/loader.js"></script>
<script>
setTimeout(async () => {
  log('=== 8s depois ===', 'ok');
  log('typeof DB = ' + typeof DB);
  log('typeof DBRemote = ' + typeof DBRemote);
  log('typeof firebase = ' + typeof firebase);
  log('typeof init = ' + typeof init);
  if (typeof DB !== 'undefined') {
    log('  DB.backend = ' + DB.backend);
    log('  DB._ready = ' + DB._ready);
  }
  // Tentar forçar getPedidosAsync diretamente
  if (typeof DBRemote !== 'undefined') {
    log('--- Forçando getPedidosAsync ---');
    try {
      const r = await DBRemote.getPedidosAsync();
      log('  OK! ' + r.length + ' pedidos', 'ok');
    } catch (e) {
      log('  ERRO: ' + e.message, 'err');
      log('  stack: ' + e.stack, 'err');
    }
  }
}, 8000);
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Debug Direto</title>
<style>
  #dbg { position:fixed; top:0; left:0; right:0; max-height:90vh; overflow:auto; background:#000; color:#0f0; font:12px monospace; padding:10px; z-index:9999; }
  #dbg .err { color:#f55; }
  #dbg .warn { color:#fa0; }
  #dbg .ok { color:#5f5; }
</style>
</head>
<body>
<div id="dbg"></div>
<script>
const dbg = document.getElementById('dbg');
function log(msg, type='') {
  const div = document.createElement('div');
  div.className = type;
  div.textContent = '[' + new Date().toISOString().substr(11,8) + '] ' + msg;
  dbg.appendChild(div);
  console.log(msg);
}
window.addEventListener('error', e => {
  log('❌ ERROR: ' + e.message + ' @ ' + e.filename + ':' + e.lineno + ':' + e.colno, 'err');
  if (e.error) log('   stack: ' + e.error.stack, 'err');
});
window.addEventListener('unhandledrejection', e => log('❌ UNHANDLED: ' + (e.reason && e.reason.message || e.reason), 'err'));
log('Página carregada');

// Carrega painel.js direto, sem loader
const s = document.createElement('script');
s.src = 'https://liderancaindigofabio-lab.github.io/donna-pizza-demo/pizzaria/js/painel.js?v=debug-direct';
s.onload = () => {
  log('painel.js onload disparou', 'ok');
  log('typeof init = ' + typeof init, 'ok');
  log('typeof filtroStatus = ' + typeof filtroStatus, 'ok');
  if (typeof filtroStatus !== 'undefined') log('  valor: ' + filtroStatus, 'ok');
};
s.onerror = (e) => log('painel.js ERRO ao carregar: ' + e, 'err');
document.head.appendChild(s);
</script>
</body>
</html>

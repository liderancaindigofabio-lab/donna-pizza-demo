<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Debug Despacho</title>
<link rel="stylesheet" href="https://liderancaindigofabio-lab.github.io/donna-pizza-demo/pizzaria/css/painel-v6.css">
<style>
  #dbg { position:fixed; top:0; left:0; right:0; max-height:50vh; overflow:auto; background:#000; color:#0f0; font:11px monospace; padding:10px; z-index:9999; }
  #dbg .err { color:#f55; }
  #dbg .warn { color:#fa0; }
  #dbg .ok { color:#5f5; }
</style>
</head>
<body>
<div id="dbg"></div>
<script>
const dbg = document.getElementById('dbg');
function log(msg, type='') {
  const div = document.createElement('div');
  div.className = type;
  div.textContent = '[' + new Date().toISOString().substr(11,8) + '] ' + msg;
  dbg.appendChild(div);
}
const origLog = console.log;
const origErr = console.error;
const origWarn = console.warn;
console.log = function(...args) { log(args.join(' '), 'ok'); origLog.apply(console, args); };
console.warn = function(...args) { log('⚠️ ' + args.join(' '), 'warn'); origWarn.apply(console, args); };
console.error = function(...args) { log('❌ ' + args.join(' '), 'err'); origErr.apply(console, args); };
window.addEventListener('error', e => log('❌ ERROR: ' + e.message + ' @ ' + e.filename + ':' + e.lineno + ':' + e.colno, 'err'));
window.addEventListener('unhandledrejection', e => log('❌ UNHANDLED: ' + (e.reason && e.reason.message || e.reason), 'err'));
</script>
<script src="https://liderancaindigofabio-lab.github.io/donna-pizza-demo/js/firebase/config.js"></script>
<script src="https://liderancaindigofabio-lab.github.io/donna-pizza-demo/js/firebase/loader.js"></script>
<script>
setTimeout(() => {
  log('=== Init OK, testando abrirDespacho ===', 'ok');
  if (typeof abrirDespacho === 'function') {
    log('abrirDespacho existe');
    // Pega o primeiro pedido em 'pronto'
    const pedidos = DB.getPedidos();
    log('Total pedidos: ' + pedidos.length);
    const pronto = pedidos.find(p => p.status === 'pronto');
    if (!pronto) { log('Sem pedido em pronto', 'err'); return; }
    log('Pedido pronto: id=' + pronto.id + ' (type=' + typeof pronto.id + '), status=' + pronto.status);
    log('  cliente? ' + !!pronto.cliente);
    log('  clienteNome? ' + !!pronto.clienteNome);
    // Tenta abrir o despacho
    try {
      abrirDespacho(pronto.id);
      log('abrirDespacho chamado OK', 'ok');
      log('modalDespacho display: ' + document.getElementById('modalDespacho').style.display, 'ok');
    } catch (e) {
      log('❌ ERRO em abrirDespacho: ' + e.message, 'err');
      log('  stack: ' + e.stack, 'err');
    }
  } else {
    log('abrirDespacho NÃO existe', 'err');
  }
}, 5000);
</script>
</body>
</html>

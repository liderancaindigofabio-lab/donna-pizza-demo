<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"><title>Testar Híbrido</title>
<style>
body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #0f0; font-size: 12px; }
pre { white-space: pre-wrap; }
.ok { color: #4ade80; }
.bad { color: #f87171; }
.warn { color: #fbbf24; }
</style>
</head>
<body>
<h2>🔍 Auditoria Híbrida (Local + Firebase)</h2>
<div id="out">Aguarde...</div>
<script src="/donna-pizza-demo/js/firebase/config.js?v=15"></script>
<script src="/donna-pizza-demo/js/firebase/loader.js?v=15"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>
firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.database();
const out = document.getElementById('out');
function log(msg, cls) { out.innerHTML += `<span class="${cls||''}">${msg}</span>\n`; }

// Espera o DB carregar
setTimeout(async () => {
  log('=== ESTADO APÓS 5s ===');
  log('window.DB: ' + (window.DB ? 'OK' : 'NÃO'));
  log('typeof DB: ' + typeof DB);
  
  // Acessa o DB no escopo do db-adapter
  try {
    const dbModule = await import('/donna-pizza-demo/js/firebase/db-adapter.js');
    log('DB importado: ' + (dbModule.DB ? 'OK' : 'NÃO'));
  } catch(e) {
    log('Erro import: ' + e.message, 'bad');
  }
  
  // Usa firebase direto pra comparar
  log('\n=== FIREBASE DIRETO ===');
  const snap = await db.ref('pedidos').once('value');
  const fb = snap.val() || {};
  const fbArr = Object.values(fb);
  log('Total no Firebase: ' + fbArr.length);
  fbArr.forEach(p => {
    log(`  ID ${p.id}: status=${p.status}, motoboy=${p.motoboyId}, cliente=${p.clienteNome||p.cliente?.nome||'?'}, coords=${p.coords ? 'SIM' : 'NÃO'}`);
  });
  
  // Lê localStorage
  log('\n=== LOCALSTORAGE ===');
  const pedidos = JSON.parse(localStorage.getItem('donna_pedidos') || '[]');
  log('localStorage pedidos: ' + pedidos.length);
  
  // Verifica se tem outro path
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    log('  key: ' + k + ' = ' + (localStorage.getItem(k) || '').slice(0, 100));
  }
}, 5000);
</script>
</body>
</html>

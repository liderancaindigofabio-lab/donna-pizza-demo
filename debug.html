<!DOCTYPE html>
<html>
<head>
<title>Debug DB</title>
<style>body{font-family:monospace;padding:20px;} pre{background:#f0f0f0;padding:10px;}</style>
</head>
<body>
<h1>🔍 Debug do DB Adapter</h1>
<div id="out">carregando...</div>
<pre id="logs"></pre>
<script src="js/firebase/config.js?v=3"></script>
<script>
const logs = [];
function log(s) { logs.push(s); document.getElementById('logs').textContent = logs.join('\n'); }
log('1. config.js carregado');
log('2. FIREBASE_ATIVO = ' + (typeof FIREBASE_ATIVO !== 'undefined' ? FIREBASE_ATIVO : 'undefined'));
</script>
<script>
(function() {
    function loadScript(src, cb) {
        log('3. carregando ' + src);
        const s = document.createElement('script');
        s.src = src;
        s.onload = () => { log('  ✓ ' + src); cb && cb(); };
        s.onerror = (e) => { log('  ✗ ERRO ' + src); };
        document.head.appendChild(s);
    }
    loadScript('js/firebase/db-adapter.js?v=3', () => {
        log('4. DB existe? ' + (typeof DB !== 'undefined' ? 'sim' : 'não'));
        if (typeof DB !== 'undefined') {
            log('5. DB.init() retorna: ' + typeof DB.init);
            const p = DB.init();
            log('6. init() valor: ' + p);
            log('7. init é Promise? ' + (p instanceof Promise));
            if (p && p.then) {
                p.then(() => {
                    log('8. DB pronto');
                    log('9. pedidos no cache: ' + DB.getPedidos().length);
                    log('10. motoboys: ' + DB.getMotoboys().length);
                    document.getElementById('out').textContent = '✅ TUDO CERTO!';
                }).catch(e => log('ERRO: ' + e.message));
            } else {
                document.getElementById('out').textContent = '❌ init() não retornou Promise';
            }
        }
    });
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html><head><title>Debug Fila Pizzaria (versão completa)</title>
<style>body{font-family:monospace;padding:20px;background:#000;color:#0f0;font-size:11px;}</style>
</head><body>
<h1>🐛 Debug Pizzaria (com adapter)</h1>
<div id="out">Carregando...</div>
<script src="js/firebase/config.js?v=14"></script>
<script src="js/firebase/loader.js?v=14"></script>
<script>
const out = document.getElementById('out');
function log(msg) { out.innerHTML += '> ' + msg + '<br>'; console.log(msg); }
window.addEventListener('error', e => log('❌ ERRO: ' + e.message + ' @ ' + e.filename + ':' + e.lineno));

// Captura console.log
const origLog = console.log;
console.log = function(...args) {
    out.innerHTML += '📋 ' + args.join(' ') + '<br>';
    origLog.apply(console, args);
};

setTimeout(() => {
    log('--- 1s após carregamento ---');
    if (typeof DB === 'undefined') { log('❌ DB não definido'); return; }
    log('backend: ' + DB.backend);
    log('pedidos: ' + DB.getPedidos().length);
    log('motoboys: ' + DB.getMotoboys().length);
    log('métricas: ' + JSON.stringify(DB.getMetricasHoje()));
}, 1000);

setTimeout(() => {
    log('--- 3s ---');
    if (typeof DB === 'undefined') return;
    log('pedidos: ' + DB.getPedidos().length);
    if (DB.getPedidos()[0]) log('primeiro: ' + DB.getPedidos()[0].cliente.nome);
    log('métricas: ' + JSON.stringify(DB.getMetricasHoje()));
}, 3000);
</script>
</body></html>

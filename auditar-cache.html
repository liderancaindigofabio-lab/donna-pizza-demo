<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"><title>Auditar Cache</title>
<style>
body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #0f0; font-size: 13px; }
pre { white-space: pre-wrap; }
.ok { color: #4ade80; }
.bad { color: #f87171; }
.warn { color: #fbbf24; }
</style>
</head>
<body>
<h2>🔍 Auditar Cache Local vs Firebase</h2>
<div id="out">Aguarde...</div>
<script src="../js/firebase/config.js?v=15"></script>
<script src="../js/firebase/loader.js?v=15"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>
firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.database();
const out = document.getElementById('out');
function log(msg, cls) { out.innerHTML += `<span class="${cls||''}">${msg}</span>\n`; }

setTimeout(async () => {
  if (!window.DB) {
    log('ERRO: DB não carregou', 'bad');
    return;
  }
  try {
    // Espera o cache carregar
    await new Promise(r => setTimeout(r, 2000));
    
    log('=== AUDITORIA DO CACHE ===\n');
    log('Backend: ' + DB.backend);
    log('Cache pedidos: ' + (DB._cachePedidos ? DB._cachePedidos.length : 'undef') + ' itens');
    log('Cache motoboys: ' + (DB._cacheMotoboys ? DB._cacheMotoboys.length : 'undef') + ' itens');
    
    log('\n=== PEDIDOS NO CACHE LOCAL ===');
    const local = DB.getPedidos();
    log('getPedidos() retornou: ' + local.length + ' itens');
    local.forEach(p => {
      const temCliente = !!(p.cliente);
      const temCoords = !!(p.coords);
      log(`  ID ${p.id}: status=${p.status}, motoboy=${p.motoboyId}, cliente=${p.clienteNome||p.cliente?.nome||'?'}, coords=${temCoords?'SIM':'NÃO'}`, temCliente ? 'ok' : 'bad');
    });
    
    log('\n=== PEDIDOS NO FIREBASE (REAL) ===');
    const snap = await db.ref('pedidos').once('value');
    const fb = snap.val() || {};
    const fbArr = Object.values(fb);
    log('Total no Firebase: ' + fbArr.length);
    fbArr.forEach(p => {
      log(`  ID ${p.id}: status=${p.status}, motoboy=${p.motoboyId}, cliente=${p.clienteNome||p.cliente?.nome||'?'}`);
    });
    
    log('\n=== DIFERENÇAS ===');
    const localIds = new Set(local.map(p => String(p.id)));
    const fbIds = new Set(fbArr.map(p => String(p.id)));
    const missing = fbArr.filter(p => !localIds.has(String(p.id)));
    const extras = local.filter(p => !fbIds.has(String(p.id)));
    log('No Firebase mas NÃO no cache: ' + missing.length, missing.length ? 'bad' : 'ok');
    missing.forEach(p => log('  - ' + p.id + ' (' + p.status + ')'));
    log('No cache mas NÃO no Firebase: ' + extras.length, extras.length ? 'warn' : 'ok');
    extras.forEach(p => log('  - ' + p.id + ' (' + p.status + ')'));
  } catch (e) {
    log('ERRO: ' + e.message, 'bad');
  }
}, 500);
</script>
</body>
</html>

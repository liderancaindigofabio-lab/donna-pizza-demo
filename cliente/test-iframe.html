<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>Test iFrame</title>
<style>body { background:#000; color:#0f0; font-family:monospace; padding:10px; font-size:11px; }</style>
</head>
<body>
<div id="out">Carregando...</div>
<iframe id="ifr" src="./?v=iframe1" style="width:1200px; height:800px; border:1px solid #0f0;"></iframe>
<script>
const out = document.getElementById('out');
const ifr = document.getElementById('ifr');
ifr.addEventListener('load', () => {
  setTimeout(() => {
    try {
      const w = ifr.contentWindow;
      const d = ifr.contentDocument;
      out.textContent += '\niframe: abrirAcompanhamento=' + (typeof w.abrirAcompanhamento);
      const modal = d.getElementById('modalAcompanhamento');
      out.textContent += '\nmodalAcompanhamento = ' + (modal ? 'EXISTS' : 'NÃO EXISTE');
      if (modal) {
        out.textContent += '\nmodal.style.display = ' + modal.style.display;
      }
      const body = d.getElementById('pedidoAcompanhamento');
      out.textContent += '\nbody HTML length = ' + (body ? body.innerHTML.length : 0);
      if (body && body.innerHTML) {
        out.textContent += '\nbody contains mapaCliente: ' + body.innerHTML.includes('mapaCliente');
        out.textContent += '\nbody contains tracker-map: ' + body.innerHTML.includes('tracker-map');
        out.textContent += '\nbody HTML snippet: ' + body.innerHTML.substring(0, 400);
      }
      // Set pedido e abrir
      d.querySelector('html').innerHTML; // noop
      // Tenta abrir
      w.localStorage.setItem('donna_cliente_logado', JSON.stringify({
        tel: "79999991234", nome: "Fabio Teste Final",
        end: "Rua do Teste Final, 999 - Centro, Aracaju - SE",
        endereco: { rua: "Rua do Teste Final", numero: "999", bairro: "Centro", cidade: "Aracaju", cep: "49000-000" }
      }));
      w.localStorage.setItem('donna_meu_pedido', '1783540413580');
      w.confirm = function() { return true; };
      // Recarrega iframe
      out.textContent += '\nRecarregando iframe com localStorage setado...';
      ifr.src = './?v=iframe2&pedido=1783540413580';
    } catch (e) {
      out.textContent += '\n❌ ' + e.message;
    }
  }, 6000);
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>Inspect2</title>
<style>body { font-family:monospace; padding:10px; background:#000; color:#0f0; font-size:11px; }</style>
</head>
<body>
<pre id="out">Carregando...</pre>
<script>
const out = document.getElementById('out');
const origLog = console.log;
const origErr = console.error;
console.log = function(...args) { out.textContent += '\nLOG: ' + args.join(' '); origLog.apply(console, args); };
console.error = function(...args) { out.textContent += '\n❌ ' + args.join(' '); origErr.apply(console, args); };
window.addEventListener('error', e => { out.textContent += '\n❌ ERROR: ' + e.message + ' @ ' + e.filename + ':' + e.lineno + ':' + e.colno; });
</script>
<script src="https://liderancaindigofabio-lab.github.io/donna-pizza-demo/js/firebase/config.js?v=2"></script>
<script src="https://liderancaindigofabio-lab.github.io/donna-pizza-demo/js/firebase/loader.js?v=2"></script>
<script src="https://liderancaindigofabio-lab.github.io/donna-pizza-demo/cliente/js/app.js?v=inspect2"></script>
<script>
setTimeout(() => {
  out.textContent += '\n--- @5s ---';
  out.textContent += '\nwindow.cardapio = ' + (window.cardapio ? 'tem ' + Object.keys(window.cardapio).join(',') : 'NÃO EXISTE');
  out.textContent += '\nwindow.DB = ' + (window.DB ? 'EXISTS' : 'null');
  if (window.DB) {
    out.textContent += '\nDB._ready = ' + window.DB._ready;
    out.textContent += '\nDB.backend = ' + window.DB.backend;
    out.textContent += '\nDB._cacheCardapio = ' + (window.DB._cacheCardapio ? 'EXISTS (sabores=' + window.DB._cacheCardapio.sabores?.length + ')' : 'null');
    try {
      const c = window.DB.getCardapio();
      out.textContent += '\ngetCardapio() keys = ' + (c ? Object.keys(c).join(',') : 'null');
      out.textContent += '\ngetCardapio().tamanhos length = ' + (c?.tamanhos?.length || 0);
      out.textContent += '\ngetCardapio().sabores length = ' + (c?.sabores?.length || 0);
    } catch(e) {
      out.textContent += '\ngetCardapio() ERR: ' + e.message;
    }
  }
  out.textContent += '\nprodutos div = ' + (document.getElementById('produtos') ? document.getElementById('produtos').innerHTML.length + ' chars' : 'NÃO EXISTE');
  if (document.getElementById('produtos')) {
    out.textContent += '\nprodutos content snippet: ' + document.getElementById('produtos').innerHTML.substring(0, 300);
  }
}, 5000);
</script>
</body>
</html>

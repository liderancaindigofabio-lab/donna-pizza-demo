<title>Modal Direct</title>
</head>
<body>
<h1>Carregando cliente e abrindo modal...</h1>
<script>

clientes[cliente.tel] = cliente;

const pedidos = [
  { id: 1001, cliente, itens: [{nome:"Pizza Margherita", qtd:1}, {nome:"Coca-Cola 2L", qtd:1}], total: 62, pagamento: "PIX", status: "em_entrega", motoboyId: 1, criadoEm: new Date().toISOString() },
  { id: 1002, cliente, itens: [{nome:"Pizza Calabresa", qtd:1}], total: 62, pagamento: "Cartão", status: "entregue", criadoEm: "2025-06-20" }
];
localStorage.setItem('donna_pedidos', JSON.stringify(pedidos));

const motoboys = { 1: { id: 1, nome: "Carlos Silva", tel: "16988887777", placa: "BRA2E19" } };
localStorage.setItem('donna_motoboys', JSON.stringify(motoboys));
</script>
</body>
</html>

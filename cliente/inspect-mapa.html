<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>Inspect Mapa</title>
<style>body { font-family:monospace; padding:10px; background:#000; color:#0f0; }</style>
</head>
<body>
<pre id="out">Carregando...</pre>
<script>
const out = document.getElementById('out');
const origLog = console.log;
const origErr = console.error;
console.log = function(...args) { out.textContent += '\nLOG: ' + args.join(' '); origLog.apply(console, args); };
console.error = function(...args) { out.textContent += '\n❌ ' + args.join(' '); origErr.apply(console, args); };
window.addEventListener('error', e => { out.textContent += '\n❌ ERROR: ' + e.message + ' @ ' + e.filename + ':' + e.lineno + ':' + e.colno; });
window.addEventListener('unhandledrejection', e => { out.textContent += '\n❌ UNHANDLED: ' + (e.reason?.message || e.reason); });
</script>
<script src="https://liderancaindigofabio-lab.github.io/donna-pizza-demo/js/firebase/config.js"></script>
<script src="https://liderancaindigofabio-lab.github.io/donna-pizza-demo/js/firebase/loader.js"></script>
<script src="https://liderancaindigofabio-lab.github.io/donna-pizza-demo/cliente/js/app.js?v=inspect1"></script>
<script>
setTimeout(() => {
  out.textContent += '\n--- INSPECIONANDO ---';
  out.textContent += '\nmeuPedidoId = ' + window.meuPedidoId;
  out.textContent += '\nclienteLogado = ' + JSON.stringify(window.clienteLogado);
  out.textContent += '\nDB._ready = ' + DB._ready;
  out.textContent += '\nDB._cachePedidos.length = ' + (DB._cachePedidos || []).length;
  // Verificar o pedido
  const p = (DB._cachePedidos || []).find(x => x.id == 1783540413580);
  out.textContent += '\nPedido 1783540413580: ' + (p ? 'status=' + p.status : 'NÃO ENCONTRADO');
  // Verificar se mapaCliente existe
  out.textContent += '\nmapaCliente = ' + (window.mapaCliente ? 'EXISTS' : 'null');
  // Tentar abrir
  if (typeof abrirAcompanhamento === 'function') {
    out.textContent += '\nabrirAcompanhamento existe';
    try {
      abrirAcompanhamento();
      out.textContent += '\nabrirAcompanhamento chamado';
      setTimeout(() => {
        const modal = document.getElementById('modalAcompanhamento');
        out.textContent += '\nmodal display = ' + (modal ? modal.style.display : 'NÃO ENCONTREI');
        const body = document.getElementById('pedidoAcompanhamento');
        if (body) {
          out.textContent += '\nbody HTML length = ' + body.innerHTML.length;
          out.textContent += '\nbody HTML snippet: ' + body.innerHTML.substring(0, 300);
          out.textContent += '\nmapaCliente = ' + (window.mapaCliente ? 'EXISTS' : 'null');
        }
        const mc = document.getElementById('mapaCliente');
        out.textContent += '\n#mapaCliente existe = ' + (mc ? 'sim' : 'não');
        if (mc) {
          out.textContent += '\n#mapaCliente children = ' + mc.children.length;
          out.textContent += '\n#mapaCliente classes = ' + mc.className;
          out.textContent += '\n#mapaCliente style = ' + mc.style.cssText;
        }
      }, 1500);
    } catch (e) {
      out.textContent += '\n❌ ERRO ao chamar abrirAcompanhamento: ' + e.message;
    }
  } else {
    out.textContent += '\nabrirAcompanhamento NÃO EXISTE';
  }
}, 3000);
</script>
</body>
</html>
